<!doctype html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Digital business card of Max Kogan.">
  <title>Max Kogan - Web & UX/UI Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>document.documentElement.classList.remove('no-js');</script>
</head>
<body>
  <div class="app" id="app">
    <section class="loader" id="loader" aria-label="Loading digital business card">
      <div class="loader__identity">
        <h1 class="loader__name" aria-label="MK">
          <span class="loader__word">MK</span>
      
        </h1>
        <p class="loader__role">WEB &amp; UX/UI DESIGNER</p>
      </div>

      <div class="loader__status" aria-hidden="true">
        <div class="loader__track">
          <span class="loader__progress"></span>
        </div>
        <span class="loader__value" id="loaderValue">00</span>
      </div>
    </section>

    <main class="profile" id="profile" aria-hidden="true">
      <figure class="profile__media">
        <img
          src="assets/max-kogan.jpg"
          alt="Portrait of Max Kogan"
          width="3024"
          height="4032"
          decoding="async"
          fetchpriority="high"
        >
      </figure>

      <section class="profile__body" aria-labelledby="profileName">
        <header class="profile__identity reveal reveal--1">
          <h2 class="profile__name" id="profileName">MAX KOGAN</h2>
          <p class="profile__role">WEB &amp; UX/UI DESIGNER</p>
        </header>

        <p class="profile__description reveal reveal--2">
          I design clear, distinctive websites<br>
          and digital experiences.
        </p>

        <nav class="profile__actions reveal reveal--3" aria-label="Main links">
          <a class="action" href="https://portfoliomk.ru/" target="_blank" rel="noreferrer">
            <span>VIEW PORTFOLIO</span>
            <span class="action__mark" aria-hidden="true">&#8599;</span>
          </a>
          <button class="action" id="openContacts" type="button" aria-haspopup="dialog" aria-controls="contacts">
            <span>CONTACTS</span>
            <span class="action__mark action__mark--plus" aria-hidden="true">+</span>
          </button>
        </nav>
      </section>
    </main>

    <section class="contacts" id="contacts" role="dialog" aria-modal="true" aria-labelledby="contactsTitle" aria-hidden="true">
      <div class="contacts__backdrop" aria-hidden="true"></div>

      <div class="contacts__sheet" role="document">
        <header class="contacts__header">
          <h2 id="contactsTitle">CONTACTS</h2>
          <button class="contacts__close" id="closeContacts" type="button" aria-label="Close contacts">
            <span>CLOSE</span>
            <span aria-hidden="true">&#10005;</span>
          </button>
        </header>

        <div class="contacts__list">
          <a class="contact" style="--order: 0" href="https://t.me/matiktry" target="_blank" rel="noreferrer">
            <span class="contact__label">TELEGRAM</span>
            <span class="contact__value">@MATIKTRY</span>
            <span class="contact__arrow" aria-hidden="true">&#8599;</span>
          </a>

          <a class="contact" style="--order: 1" href="mailto:koganmaximik@yandex.ru">
            <span class="contact__label">EMAIL</span>
            <span class="contact__value contact__value--email">KOGANMAXIMIK@YANDEX.RU</span>
            <span class="contact__arrow" aria-hidden="true">&#8599;</span>
          </a>

          <a class="contact" style="--order: 2" href="https://www.instagram.com/maxk.design/" target="_blank" rel="noreferrer">
            <span class="contact__label">INSTAGRAM</span>
            <span class="contact__value">@MAXK.DESIGN</span>
            <span class="contact__arrow" aria-hidden="true">&#8599;</span>
          </a>

          <a class="contact" style="--order: 3" href="https://portfoliomk.ru/" target="_blank" rel="noreferrer">
            <span class="contact__label">PORTFOLIO</span>
            <span class="contact__value">PORTFOLIOMK.RU</span>
            <span class="contact__arrow" aria-hidden="true">&#8599;</span>
          </a>
        </div>
      </div>
    </section>
  </div>

  <noscript>
    <style>
      .loader { display: none; }
      .profile { visibility: visible; }
      .profile__media, .reveal { opacity: 1; transform: none; clip-path: none; }
    </style>
  </noscript>
  <script src="script.js"></script>
</body>
</html>
